<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 차트분석 v1.05</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }
        .chart-container { background: #1e293b; border-radius: 20px; border: 3px solid #334155; position: relative; }
        
        /* 기본 차트선: 빨간색 + 더 굵게 (v1.05 핵심) */
        .base-line { stroke: #f43f5e; stroke-width: 7; fill: none; opacity: 0.8; }
        
        /* 피보나치 분석선: 파란색 + 최상단 굵기 */
        .fibo-trace { 
            stroke: #3b82f6; stroke-width: 9; fill: none; 
            stroke-linecap: round; stroke-linejoin: round;
            transition: stroke-dashoffset 1.5s ease-in-out;
        }

        /* 피보나치 레벨 및 텍스트 (가독성 증대) */
        .level-line { stroke-width: 2; stroke-dasharray: 8; opacity: 0.4; }
        .level-text { font-size: 16px; font-weight: 900; opacity: 1; } /* 글자 크기 키움 */
        
        /* 3대 포인트 라벨: 40대 이상 사용자를 위한 대형 디자인 */
        .label-pop { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 시나리오 점선 굵기 강화 */
        .scenario-up { stroke: #10b981; stroke-width: 7; stroke-dasharray: 10; opacity: 0; transition: opacity 0.5s; }
        .scenario-down { stroke: #f43f5e; stroke-width: 7; stroke-dasharray: 10; opacity: 0; transition: opacity 0.5s; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 border-b-4 border-slate-700 pb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-5xl font-black text-blue-400 tracking-tighter">AI 차트분석 <span class="text-emerald-400">v1.05</span></h1>
                <h2 class="text-3xl font-bold text-white mt-1">피보나치 분석</h2> <p class="text-slate-400 mt-2 font-bold italic">Step-by-Step Fibonacci Analysis</p>
            </div>
            <button onclick="startAnalysisv105()" id="btn-start" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-5 rounded-2xl font-black text-2xl shadow-2xl transition-all active:scale-95">
                분석 실행
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 chart-container p-4 md:p-10">
                <svg viewBox="0 0 1000 600" class="w-full h-auto" id="chart-svg">
                    <g id="levels">
                        <line x1="50" y1="100" x2="880" y2="100" class="level-line stroke-slate-400" />
                        <text x="890" y="105" class="level-text fill-white text-xl">0.0 (최고점)</text>
                        
                        <line x1="50" y1="285.4" x2="880" y2="285.4" class="level-line stroke-orange-500" />
                        <text x="890" y="290.4" class="level-text fill-orange-500 text-2xl">0.618 (지지선)</text>
                        
                        <line x1="50" y1="400" x2="880" y2="400" class="level-line stroke-slate-400" />
                        <text x="890" y="405" class="level-text fill-white text-xl">1.0 (최저점)</text>
                    </g>

                    <polyline points="50,400 350,100 535,285.4 680,100" class="base-line" />
                    
                    <path id="fibo-path" d="M 50 400" class="fibo-trace" fill="none" />

                    <path id="path-up" d="M 680 100 L 820 20" class="scenario-up" fill="none" />
                    <path id="path-down" d="M 680 100 L 820 250" class="scenario-down" fill="none" />

                    <g id="labels-group">
                        <g id="label-1" class="opacity-0">
                            <rect x="280" y="20" width="140" height="45" rx="10" fill="#3b82f6" />
                            <text x="350" y="50" fill="white" font-size="22" font-weight="900" text-anchor="middle">전고점</text>
                        </g>
                        <g id="label-2" class="opacity-0">
                            <rect x="460" y="320" width="200" height="50" rx="10" fill="#f59e0b" />
                            <text x="560" y="355" fill="white" font-size="24" font-weight="900" text-anchor="middle">0.618 지점</text>
                        </g>
                        <g id="label-3" class="opacity-0">
                            <rect x="620" y="20" width="150" height="45" rx="10" fill="#6366f1" />
                            <text x="695" y="50" fill="white" font-size="22" font-weight="900" text-anchor="middle">저항진입</text>
                        </g>
                        
                        <text id="txt-up" x="830" y="40" class="opacity-0 fill-emerald-400 font-black text-2xl">A. 돌파</text>
                        <text id="txt-down" x="830" y="280" class="opacity-0 fill-rose-500 font-black text-2xl">B. 하락</text>
                    </g>
                </svg>
            </div>

            <div class="bg-slate-800 p-8 rounded-3xl border-4 border-slate-700 h-fit shadow-2xl">
                <h4 class="text-2xl font-black text-indigo-400 mb-6 uppercase italic">분석 리포트</h4>
                <div id="log" class="space-y-4 text-lg font-bold text-slate-300">
                    <p>> 분석 대기 중...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function startAnalysisv105() {
            const path = document.getElementById('fibo-path');
            const log = document.getElementById('log');
            const btn = document.getElementById('btn-start');
            
            btn.disabled = true;
            btn.innerText = "분석 중...";
            path.setAttribute('d', 'M 50 400');
            document.querySelectorAll('[id^="label-"], [id^="txt-"], .scenario-up, .scenario-down').forEach(el => el.classList.add('opacity-0'));
            log.innerHTML = "<p class='text-blue-400'>> 데이터 스캔 시작...</p>";

            const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            // 1단계: 전고점 상승
            await wait(1000);
            path.setAttribute('d', 'M 50 400 L 350 100');
            log.innerHTML += "<p class='text-white'>> 전고점 목표 도달</p>";
            await wait(1200);
            document.getElementById('label-1').classList.replace('opacity-0', 'label-pop');

            // 2단계: 피보나치 조정 (0.618)
            await wait(1500);
            path.setAttribute('d', 'M 50 400 L 350 100 L 535 285.4');
            log.innerHTML += "<p class='text-orange-400'>> 0.618 조정 확인</p>";
            await wait(1200);
            document.getElementById('label-2').classList.replace('opacity-0', 'label-pop');

            // 3단계: 저항선 재진입
            await wait(1500);
            path.setAttribute('d', 'M 50 400 L 350 100 L 535 285.4 L 680 100');
            log.innerHTML += "<p class='text-indigo-400'>> 저항선 재진입</p>";
            await wait(1200);
            document.getElementById('label-3').classList.replace('opacity-0', 'label-pop');

            // 4단계: 시나리오 분기
            await wait(1200);
            document.querySelector('.scenario-up').style.opacity = "1";
            document.querySelector('.scenario-down').style.opacity = "1";
            document.getElementById('txt-up').classList.remove('opacity-0');
            document.getElementById('txt-down').classList.remove('opacity-0');
            log.innerHTML += "<p class='text-emerald-400 font-black'>> 최종 분석 완료</p>";
            
            btn.disabled = false;
            btn.innerText = "다시 실행";
        }
    </script>
</body>
</html>
