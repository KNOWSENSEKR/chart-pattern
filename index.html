<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS 패턴 분석기 - 하락치 애니메이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .chart-container { background: #1e293b; border-radius: 12px; border: 1px solid #334155; position: relative; }
        .neckline { stroke: #ef4444; stroke-width: 3; }
        .h-vector { stroke: #10b981; stroke-width: 4; stroke-dasharray: 8; transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .target-arrow { fill: #ef4444; opacity: 0; transition: opacity 0.5s; }
        .price-label { font-size: 14px; font-weight: bold; fill: #94a3b8; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .active-calc { animation: pulse 1s infinite; color: #10b981; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">📈 차트 패턴 분석 전문가 (Beta)</h1>
                <p class="text-slate-400 mt-2 italic">추세 반전 분석: <span class="text-white">하락 목표치($H$) 정밀 투사</span></p>
            </div>
            <button onclick="runAnalysis()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-full font-bold transition-all transform hover:scale-105">
                분석 실행 (Run)
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 chart-container p-6">
                <svg viewBox="0 0 800 500" class="w-full h-auto" id="main-svg">
                    <path d="M 0 100 H 800 M 0 200 H 800 M 0 300 H 800 M 0 400 H 800" stroke="#334155" stroke-width="1" />
                    
                    <polyline points="50,350 150,200 250,300 400,80 550,300 650,200 720,450" fill="none" stroke="#64748b" stroke-width="2" />
                    
                    <polyline points="150,200 250,300 400,80 550,300 650,200" fill="none" stroke="#fbbf24" stroke-width="3" />
                    
                    <line x1="220" y1="300" x2="580" y2="300" class="neckline" id="neckline-path" />

                    <line id="h-vector" x1="400" y1="80" x2="400" y2="300" class="h-vector" />
                    <text id="h-label" x="410" y="190" fill="#10b981" class="opacity-0 font-bold">H (높이)</text>

                    <line id="projection-vector" x1="680" y1="300" x2="680" y2="300" stroke="#ef4444" stroke-width="4" stroke-dasharray="8" class="transition-all duration-1000" />
                    <text id="target-price-text" x="695" y="300" fill="#ef4444" class="opacity-0 font-bold">Target</text>

                    <text x="385" y="70" class="price-label">Head (100.0)</text>
                    <text x="220" y="325" class="price-label" fill="#ef4444">Neckline (70.0)</text>
                </svg>
            </div>

            <div class="space-y-6">
                <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                    <h4 class="text-xl font-bold text-emerald-400 mb-4 italic">Real-time Calculation</h4>
                    <div class="space-y-4 font-mono text-sm">
                        <div class="flex justify-between border-b border-slate-700 pb-2">
                            <span>Head Price:</span>
                            <span class="text-white" id="val-head">100.0</span>
                        </div>
                        <div class="flex justify-between border-b border-slate-700 pb-2">
                            <span>Neckline:</span>
                            <span class="text-white" id="val-neck">70.0</span>
                        </div>
                        <div class="flex justify-between text-emerald-400 font-bold pt-2">
                            <span>Pattern Height (H):</span>
                            <span id="val-h">0.0</span>
                        </div>
                        <div class="mt-6 p-4 bg-black rounded-lg">
                            <p class="text-xs text-slate-500 mb-2">// 하락 목표가 공식</p>
                            <p class="text-blue-300 text-sm">Target = BreakPoint - H</p>
                            <p class="text-2xl text-red-500 mt-2 font-bold" id="val-target">---</p>
                        </div>
                    </div>
                </div>
                <div class="text-xs text-slate-500 leading-relaxed p-2">
                    * 패턴의 수직 높이가 그대로 하단으로 투사되는 'Measurement Rule'이 적용되었습니다. 넥라인 이탈 시점의 가격에서 H를 차감합니다.
                </div>
            </div>
        </div>
    </div>

    <script>
        function runAnalysis() {
            const hVector = document.getElementById('h-vector');
            const hLabel = document.getElementById('h-label');
            const projVector = document.getElementById('projection-vector');
            const targetText = document.getElementById('target-price-text');
            const valH = document.getElementById('val-h');
            const valTarget = document.getElementById('val-target');

            // 1. 초기화
            hVector.style.opacity = "1";
            hLabel.classList.remove('opacity-0');
            projVector.setAttribute('y2', '300');
            targetText.classList.add('opacity-0');
            valH.innerText = "0.0";
            valTarget.innerText = "---";

            // 2. 단계별 애니메이션
            // 단계 A: 높이 H 계산 및 표시
            setTimeout(() => {
                valH.innerText = "30.0";
                valH.classList.add('active-calc');
            }, 500);

            // 단계 B: 벡터 이동 및 투사
            setTimeout(() => {
                // H 벡터를 이동시키는 시각적 효과 (프로젝션 라인 연장)
                projVector.setAttribute('y2', '450');
                targetText.setAttribute('y', '455');
                targetText.classList.remove('opacity-0');
                
                // 숫자 업데이트
                let count = 70.0;
                const timer = setInterval(() => {
                    count -= 1.0;
                    valTarget.innerText = count.toFixed(1);
                    if (count <= 40.0) {
                        clearInterval(timer);
                        valTarget.innerText = "40.0 (완료)";
                    }
                }, 30);
            }, 1500);
        }
    </script>
</body>
</html>
